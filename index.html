<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wordly</title>
  <link rel="icon" type="image/png" href="./public/logo-light.png" />
  <link rel="stylesheet" href="./css/style.css" />
</head>

<body>

    <div>

</html>
